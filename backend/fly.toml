{
  "$schema": "https://json.schemastore.org/fly.json",
  "app": "yesbill-backend",
  "primary_region": "iad",
  "build": {
    "dockerfile": "Dockerfile"
  },
  "env": {
    "ENVIRONMENT": "production"
  },
  "services": [
    {
      "internal_port": 8000,
      "protocol": "tcp",
      "auto_stop_machines": true,
      "auto_start_machines": true,
      "min_machines_running": 0,
      "processes": ["app"],
      "ports": [
        {
          "port": 80,
          "handlers": ["http"]
        },
        {
          "port": 443,
          "handlers": ["tls", "http"]
        }
      ]
    }
  ]
}

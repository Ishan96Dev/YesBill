<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YesBill</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Encodes the full path into a query string and redirects to index.html
      // segmentCount = 1 because the repo is served at /YesBill/ (one path segment)
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>

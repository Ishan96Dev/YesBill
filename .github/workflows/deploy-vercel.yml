name: Deploy Next.js Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend-next/**'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json

      # ── Install Vercel CLI ────────────────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── Install app dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        working-directory: frontend-next
        run: npm ci

      # ── Type check ─────────────────────────────────────────────────────────────
      - name: Type check
        working-directory: frontend-next
        run: npm run type-check

      # ── Configure Vercel: ignore gh-pages branch deployments ────────────────
      # Vercel's GitHub integration auto-deploys every branch, including the
      # gh-pages branch (static Docusaurus output). That branch has no
      # frontend-next/ directory so Vercel fails immediately. Setting the
      # commandForIgnoringBuildStep via API tells Vercel to skip gh-pages builds.
      # This is idempotent — safe to run on every deploy.
      - name: Configure Vercel ignored build step for gh-pages
        run: |
          curl -s -X PATCH \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"commandForIgnoringBuildStep":"if [ \"$VERCEL_GIT_COMMIT_REF\" = \"gh-pages\" ]; then exit 0; else exit 1; fi"}'
          echo "Ignored build step configured"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Deploy to Vercel (Vercel builds on its own servers) ─────────────────
      # Uses vercel deploy --prod without --prebuilt so Vercel handles the full
      # build on its infrastructure. This guarantees public/ assets are included.
      - name: Deploy to Vercel (production)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment complete
        run: echo "YesBill Next.js app deployed to Vercel 🚀"

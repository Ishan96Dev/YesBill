# ──────────────────────────────────────────────────────────────────────────────
# deploy-frontend.yml
#
# CURRENT ROLE: Deploy Docusaurus docs-site to GitHub Pages only.
#
# History:
#   - Previously also built & deployed the Vite SPA frontend.
#   - The frontend was migrated to Next.js (frontend-next/) and is now deployed
#     to Vercel via .github/workflows/deploy-vercel.yml.
#   - This workflow now only handles the docs-site, publishing to /YesBill/docs/.
#   - The old Vite `frontend/` directory remains in the repo during the
#     transition period (do not delete until Vercel is live and validated).
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs-site/**'
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Build Docs ───────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs dependencies
        run: cd docs-site && npm ci

      - name: Build documentation
        run: cd docs-site && npm run build
        env:
          DOCS_SITE_URL: 'https://ishan96dev.github.io'
          DOCS_BASE_URL: '/YesBill/docs/'

      # ── Deploy ────────────────────────────────────────────────
      - name: Assemble deploy directory
        run: |
          mkdir -p gh-pages-dist/docs
          cp -r docs-site/build/. gh-pages-dist/docs/
          # Redirect root → Vercel app (the HTML redirect is optional)
          cat > gh-pages-dist/index.html << 'HTML'
          <!DOCTYPE html>
          <html><head>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=https://yesbill.vercel.app">
          <title>YesBill</title>
          </head><body>
          <p>Redirecting to <a href="https://yesbill.vercel.app">yesbill.vercel.app</a>…</p>
          </body></html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-dist
          force_orphan: true

      - name: Deployment complete
        run: echo "YesBill docs deployed to GitHub Pages at /YesBill/docs/ ✅"

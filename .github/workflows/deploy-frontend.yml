name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'docs-site/**'
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Build Frontend ──────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # ── Build Docs ───────────────────────────────────────────
      - name: Install docs dependencies
        run: cd docs-site && npm install

      - name: Build documentation
        run: cd docs-site && npm run build

      # ── Assemble & Deploy ────────────────────────────────────
      - name: Assemble deploy directory
        run: |
          mkdir -p gh-pages-dist
          cp -r frontend/dist/. gh-pages-dist/
          mkdir -p gh-pages-dist/docs
          cp -r docs-site/build/. gh-pages-dist/docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-dist
          force_orphan: true

      - name: Deployment complete
        run: echo "YesBill deployed — frontend at /YesBill/ and docs at /YesBill/docs/"

name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Write google-services.json
        # Secret must be stored as base64 in GitHub:
        #   cat google-services.json | base64 | tr -d '\n'
        # Then paste the output as the GOOGLE_SERVICES_JSON secret value.
        working-directory: yesbill-mobile
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "WARNING: GOOGLE_SERVICES_JSON_B64 not set - writing placeholder for CI build"
            echo '{"project_info":{"project_id":"placeholder","project_number":"000000000000","firebase_url":"https://placeholder.firebaseio.com","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.yesbill.yesbill_mobile"}},"oauth_client":[],"api_key":[{"current_key":"placeholder"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > android/app/google-services.json
            echo "Placeholder google-services.json written"
          else
            echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > android/app/google-services.json
            python3 -c "import json,sys; json.load(open('android/app/google-services.json'))" || \
              { echo "ERROR: google-services.json is not valid JSON"; exit 1; }
            echo "google-services.json written and validated"
          fi
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}

      - name: Install dependencies
        working-directory: yesbill-mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: yesbill-mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        working-directory: yesbill-mobile
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yesbill-release-apk
          path: yesbill-mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Render build email template
        run: |
          BUILD_DATE=$(date -u '+%d %b %Y')
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          RUN_URL="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          sed \
            -e "s|{{BRANCH}}|${GITHUB_REF_NAME}|g" \
            -e "s|{{COMMIT_SHA}}|${SHORT_SHA}|g" \
            -e "s|{{BUILD_DATE}}|${BUILD_DATE}|g" \
            -e "s|{{RUN_URL}}|${RUN_URL}|g" \
            email-templates/11-build-notify.html > /tmp/build-email.html

      - name: Send build notification email (Brevo)
        continue-on-error: true
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          SENDER_EMAIL:  ${{ secrets.SENDER_EMAIL }}
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
          BRANCH:        ${{ github.ref_name }}
          COMMIT_SHA:    ${{ github.sha }}
          RUN_URL:       https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EMAIL_TEMPLATE: /tmp/build-email.html
        run: python3 scripts/send_build_email.py

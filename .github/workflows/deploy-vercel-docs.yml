name: Deploy Docs to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'docs-site/**'
  workflow_dispatch:

concurrency:
  group: vercel-docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Docs to Vercel
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      # ── Install Vercel CLI ────────────────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── Install & Build ───────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build Docusaurus
        working-directory: docs-site
        run: npm run build
        env:
          DOCS_SITE_URL: ${{ secrets.DOCS_SITE_URL }}
          DOCS_BASE_URL: '/'

      # ── Vercel Deploy ─────────────────────────────────────────────────────────
      # No `vercel pull` needed — VERCEL_ORG_ID + VERCEL_PROJECT_ID env vars are
      # sufficient for the CLI to locate the project. Using `vercel deploy --prod`
      # (same pattern as the working frontend workflow) lets Vercel handle the
      # build on its own servers using the buildCommand/outputDirectory from
      # docs-site/vercel.json. This avoids the "Project not found" error that
      # `vercel pull` raises when VERCEL_DOCS_PROJECT_ID is stale.
      # If this step still fails, update the VERCEL_DOCS_PROJECT_ID GitHub secret
      # to the current Vercel project ID for the docs site.
      - name: Deploy to Vercel (production)
        working-directory: docs-site
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}

      - name: Deployment complete
        run: echo "YesBill Docs deployed to Vercel 📚"

name: ✅ CI — Lint & Build Check

# Runs on:
# - Every pull request targeting the main branch
# - Every direct push to main branch
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VITE_SUPABASE_URL       → Your Supabase project URL
#   VITE_SUPABASE_ANON_KEY  → Your Supabase anon/public key
#   VITE_API_BASE_URL       → Your backend API base URL (e.g. https://api.yourdomain.com)


on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'frontend-next/**'
      - 'backend/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'frontend-next/**'
      - 'backend/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Detect which paths changed
  # ─────────────────────────────────────────────
  changes:
    name: 🔍 Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'frontend-next/**'
            backend:
              - 'backend/**'

  # ─────────────────────────────────────────────
  # Frontend: ESLint + TypeScript + Vite Build
  # ─────────────────────────────────────────────
  frontend-ci:
    name: 🖥️ Frontend — Lint & Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 ESLint — Check for lint errors
        run: npm run lint
        # Note: --max-warnings 0 is already set in package.json lint script

      - name: 🏗️ TypeScript + Vite Build
        run: npm run build
        env:
          # Build needs these to avoid "missing env" errors during compilation
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

  # ─────────────────────────────────────────────
  # Backend: Ruff lint + Python syntax check
  # ─────────────────────────────────────────────
  backend-ci:
    name: 🐍 Backend — Lint & Syntax Check
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 📦 Install linting tools
        run: pip install ruff

      - name: 🔍 Ruff — Python lint check
        run: ruff check app/
        # Uses pyproject.toml ruff config (E, W, F, I, B, C4, UP rules)

      - name: 🧪 Python syntax validation
        run: python -m py_compile app/main.py app/routers/auth.py app/routers/bills.py app/routers/ai_settings.py app/routers/chat.py app/services/email_service.py app/core/config.py
        # Quick syntax check on all critical backend files

  # ─────────────────────────────────────────────
  # Summary: Only passes if both jobs pass
  # ─────────────────────────────────────────────
  ci-status:
    name: ✅ CI Status
    runs-on: ubuntu-latest
    needs: [changes, frontend-ci, backend-ci]
    if: always()

    steps:
      - name: Check CI result
        run: |
          FRONTEND="${{ needs.frontend-ci.result }}"
          BACKEND="${{ needs.backend-ci.result }}"
          # "skipped" is acceptable when no relevant files changed
          if [[ "$FRONTEND" != "success" && "$FRONTEND" != "skipped" ]]; then
            echo "❌ Frontend CI failed: $FRONTEND"
            exit 1
          fi
          if [[ "$BACKEND" != "success" && "$BACKEND" != "skipped" ]]; then
            echo "❌ Backend CI failed: $BACKEND"
            exit 1
          fi
          echo "✅ All CI checks passed (frontend: $FRONTEND, backend: $BACKEND)"
